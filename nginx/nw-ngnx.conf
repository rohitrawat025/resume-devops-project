server {
    listen 81;
    server_name _;

    # 1. Serve the Dynamic Frontend
    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;
    }

    # 2. Proxy the API calls
    location /app {
        proxy_pass http://app:8080/app;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}
