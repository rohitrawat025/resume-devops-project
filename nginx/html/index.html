<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Professional Portfolio - Rohit Rawat</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; line-height: 1.6; color: #333; max-width: 800px; margin: 40px auto; padding: 20px; background: #f4f7f6; }
        .card { background: white; padding: 30px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        h1 { color: #2c3e50; border-bottom: 2px solid #3498db; padding-bottom: 10px; }
        .section-title { font-weight: bold; color: #3498db; margin-top: 20px; text-transform: uppercase; }
        .experience-item { margin-bottom: 15px; border-left: 3px solid #eee; padding-left: 15px; }
    </style>
</head>
<body>
    <div class="card" id="resume-content">
        <h1>Loading Profile...</h1>
    </div>

    <script>
        // This script makes the page dynamic
        async function fetchProfile() {
            try {
                // Calls your Spring Boot API
                const response = await fetch('/app'); 
                const data = await response.json();
                const profile = data[0]; // Gets the first profile from the list

                const html = `
                    <h1>${profile.fullName}</h1>
                    <p><strong>Email:</strong> ${profile.email} | <strong>Location:</strong> ${profile.location}</p>
                    
                    <div class="section-title">Summary</div>
                    <p>${profile.summary}</p>

                    <div class="section-title">Professional Experience</div>
                    ${profile.experiences.map(exp => `
                        <div class="experience-item">
                            <strong>${exp.role}</strong> at ${exp.company}<br>
                            <small>${exp.tenure}</small>
                            <p>${exp.description}</p>
                        </div>
                    `).join('')}
                `;
                document.getElementById('resume-content').innerHTML = html;
            } catch (error) {
                document.getElementById('resume-content').innerHTML = "<h1>Error loading profile.</h1>";
            }
        }
        fetchProfile();
    </script>
</body>
</html>
